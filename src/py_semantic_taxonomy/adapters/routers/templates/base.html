<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ef5552;
            --primary-hover: #dc2626;
            --text-color: #1f2937;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --bg-color: #ffffff;
            --header-bg: #ffffff;
            --nav-bg: #f8fafc;
            --border-color: #e5e7eb;
        }
        [data-theme="dark"] {
            --primary-color: #ef5552;
            --primary-hover: #dc2626;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --bg-color: #111827;
            --header-bg: #1f2937;
            --nav-bg: #374151;
            --border-color: #4b5563;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
            transition: background-color 0.3s, color 0.3s;
        }
        .header {
            background-color: var(--header-bg);
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
            transition: background-color 0.3s;
        }
        [data-theme="dark"] .header {
            border-bottom-color: #374151;
        }
        .logo {
            height: 32px;
            width: auto;
        }
        .nav-link {
            color: var(--text-color);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
            font-weight: 500;
        }
        .nav-link:hover {
            background-color: var(--nav-bg);
            color: var(--primary-color);
        }
        .nav-link.active {
            color: var(--primary-color);
            background-color: var(--nav-bg);
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            transition: all 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }
        .text-primary {
            color: var(--primary-color);
        }
        .text-primary-hover:hover {
            color: var(--primary-hover);
        }
        .focus-ring-primary:focus {
            outline: none;
            ring-color: var(--primary-color);
        }
        .page-header {
            background-color: var(--nav-bg);
            border-bottom: 1px solid #e5e7eb;
            padding: 2rem 0;
            transition: background-color 0.3s;
        }
        [data-theme="dark"] .page-header {
            border-bottom-color: #374151;
        }
        .page-header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
        }
        .page-header p {
            color: #6b7280;
            font-size: 1.125rem;
        }
        [data-theme="dark"] .page-header p {
            color: #9ca3af;
        }
        .card {
            background-color: var(--header-bg);
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            transition: all 0.2s;
        }
        .card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        [data-theme="dark"] .card {
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.3), 0 1px 2px 0 rgba(0, 0, 0, 0.2);
        }
        [data-theme="dark"] .card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }
        [data-theme="dark"] input {
            background-color: var(--nav-bg);
            border-color: #4b5563;
            color: var(--text-color);
        }
        [data-theme="dark"] input::placeholder {
            color: #9ca3af;
        }
        [data-theme="dark"] .bg-gray-50 {
            background-color: #1f2937;
        }
        [data-theme="dark"] .border-gray-200 {
            border-color: #374151;
        }
        [data-theme="dark"] .text-gray-500 {
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center">
                        <img src="https://docs.pyst.dev/img/logo.png" alt="PyST Logo" class="logo mr-3">
                        <span class="text-xl font-semibold" style="color: var(--text-color)">PyST</span>
                    </a>
                </div>
                <div class="flex-1 max-w-md mx-4">
                    <form id="searchForm" class="relative" action="/web/search/" method="get">
                        <div class="relative">
                            <input
                                type="text"
                                name="query"
                                placeholder="Search concepts..."
                                class="w-full px-4 py-2 pl-10 pr-20 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"
                                autocomplete="off"
                            />
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-search text-gray-400"></i>
                            </div>
                            <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                                <kbd class="hidden md:inline-flex items-center px-2 py-1.5 text-xs font-semibold border rounded shadow-sm" style="color: var(--text-secondary); background-color: var(--nav-bg); border-color: var(--border-color)">
                                    <span id="shortcut-key">Ctrl</span><span class="mx-0.5">+</span>K
                                </kbd>
                            </div>
                            <input type="hidden" name="semantic" value="true" />
                        </div>
                        <div id="suggestions" class="absolute w-full mt-1 border rounded-lg shadow-lg hidden z-50" style="background-color: var(--header-bg); border-color: var(--border-color)">
                            <!-- Suggestions will be populated here -->
                        </div>
                    </form>
                </div>
                <nav class="flex items-center space-x-4">
                    <button id="theme-toggle" class="nav-link" aria-label="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <a href="/web/concept_schemes/" class="nav-link {% if request.url.path == '/web/concept_schemes/' %}active{% endif %}">
                        <i class="fas fa-list mr-2"></i>Concept Schemes
                    </a>
                    <a href="/web/concept_scheme/create/" class="nav-link disabled opacity-50 cursor-not-allowed" aria-disabled="true">
                        <i class="fas fa-plus mr-2"></i>Create Scheme
                    </a>
                    <a href="https://docs.pyst.dev/" class="nav-link" target="_blank">
                        <i class="fas fa-book mr-2"></i>Documentation
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            {% block page_header %}{% endblock %}
        </div>
    </div>

    <!-- Main Content -->
    <main class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-50 border-t border-gray-200 mt-12">
        <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
            <div class="text-center text-sm text-gray-500">
                <p>© 2025 Cauldron Solutions GmbH | Code under MIT License</p>
            </div>
        </div>
    </footer>
    <script>
        // Theme handling
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');

        // Check for saved theme preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        function updateThemeIcon(theme) {
            themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        // Prevent clicks on disabled links
        document.querySelectorAll('a[aria-disabled="true"]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        // Detect OS and update shortcut key
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
        if (isMac) {
            document.getElementById('shortcut-key').textContent = '⌘';
        } else {
            document.getElementById('shortcut-key').textContent = 'Ctrl';
        }

        // Search functionality
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.querySelector('input[name="query"]');
            const suggestionsDiv = document.getElementById('suggestions');
            let debounceTimer;

            // Handle keyboard shortcut
            document.addEventListener('keydown', function(e) {
                // Check for Cmd+K (Mac) or Ctrl+K (Windows/Linux)
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    searchInput.focus();
                }
            });

            // Debounce function
            function debounce(func, delay) {
                return function() {
                    const context = this;
                    const args = arguments;
                    clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(() => func.apply(context, args), delay);
                };
            }

            // Fetch suggestions
            async function fetchSuggestions(query) {
                if (!query) {
                    suggestionsDiv.classList.add('hidden');
                    return;
                }

                try {
                    const response = await fetch(`/concept/suggest/?query=${encodeURIComponent(query)}&language=en`);
                    const suggestions = await response.json();

                    if (suggestions.length > 0) {
                        const limitedSuggestions = suggestions.slice(0, 5);
                        const hasMore = suggestions.length > 5;

                        suggestionsDiv.innerHTML = `
                            ${limitedSuggestions.map(suggestion => `
                                <div class="p-2 cursor-pointer transition-colors duration-150 hover-row" onclick="selectSuggestion('${suggestion.label}')" style="color: var(--text-color)">
                                    ${suggestion.label}
                                </div>
                            `).join('')}
                            ${hasMore ? `
                                <div class="p-2 text-sm text-center border-t" style="color: var(--text-secondary); border-color: var(--border-color)">
                                    +${suggestions.length - 5} more results
                                </div>
                            ` : ''}
                        `;
                        suggestionsDiv.classList.remove('hidden');
                    } else {
                        suggestionsDiv.classList.add('hidden');
                    }
                } catch (error) {
                    console.error('Error fetching suggestions:', error);
                    suggestionsDiv.classList.add('hidden');
                }
            }

            // Handle input with debounce
            searchInput.addEventListener('input', debounce(function(e) {
                fetchSuggestions(e.target.value);
            }, 300));

            // Handle suggestion selection
            window.selectSuggestion = function(suggestion) {
                searchInput.value = suggestion;
                suggestionsDiv.classList.add('hidden');
                document.getElementById('searchForm').submit();
            };

            // Close suggestions when clicking outside
            document.addEventListener('click', function(e) {
                if (!searchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) {
                    suggestionsDiv.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
